<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Você quer ir em um date comigo?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        html, body, #root {
            height: 100%;
            width: 100%;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 94, 168, 0.4);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // ⬇️ COLE AQUI O SEU ENDPOINT DO FORMSPREE (ex: https://formspree.io/f/abcdwxyz)
        const FORMSPREE_ENDPOINT = 'https://formspree.io/f/mlgqrovw';

        const ACCENT_GRADIENT = 'linear-gradient(135deg, #ff5ea8 0%, #8b5cf6 100%)';
        const ACCENT = '#ff5ea8';
        const ACCENT_SOFT = 'rgba(255, 94, 168, 0.15)';
        const TEXT_MUTED = '#b8b4d0';

        const DateProposal = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [language, setLanguage] = useState('en');
            const [selectedFood, setSelectedFood] = useState(null);
            const [selectedDates, setSelectedDates] = useState([]);
            const [selectedTime, setSelectedTime] = useState(null);
            const [noButtonPos, setNoButtonPos] = useState(null);
            const [dodgeCount, setDodgeCount] = useState(0);
            const [sending, setSending] = useState(false);
            const [sendError, setSendError] = useState(false);
            const noButtonRef = useRef(null);
            const yesButtonRef = useRef(null);
            const buttonsRowRef = useRef(null);

            const dodgeNoButton = () => {
                const container = buttonsRowRef.current;
                const noBtn = noButtonRef.current;
                const yesBtn = yesButtonRef.current;
                if (!container || !noBtn) return;

                const containerRect = container.getBoundingClientRect();
                const btnRect = noBtn.getBoundingClientRect();
                const yesRect = yesBtn ? yesBtn.getBoundingClientRect() : null;

                const maxX = Math.max(containerRect.width - btnRect.width, 0);
                const maxY = Math.max(containerRect.height - btnRect.height, 0);

                // Yes button box relative to the container, with padding to keep clear
                const pad = 12;
                let yesBox = null;
                if (yesRect) {
                    yesBox = {
                        left: yesRect.left - containerRect.left - pad,
                        right: yesRect.right - containerRect.left + pad,
                        top: yesRect.top - containerRect.top - pad,
                        bottom: yesRect.bottom - containerRect.top + pad
                    };
                }

                const overlapsYes = (x, y) => {
                    if (!yesBox) return false;
                    return !(x + btnRect.width < yesBox.left ||
                             x > yesBox.right ||
                             y + btnRect.height < yesBox.top ||
                             y > yesBox.bottom);
                };

                let newX = 0, newY = 0;
                for (let i = 0; i < 40; i++) {
                    newX = Math.random() * maxX;
                    newY = Math.random() * maxY;
                    if (!overlapsYes(newX, newY)) break;
                }

                setNoButtonPos({ x: newX, y: newY });
                setDodgeCount(prev => prev + 1);
            };

            useEffect(() => {
                const container = buttonsRowRef.current;
                const noBtn = noButtonRef.current;
                const yesBtn = yesButtonRef.current;
                if (!container || !noBtn || !yesBtn || noButtonPos) return;

                const containerRect = container.getBoundingClientRect();
                const btnRect = noBtn.getBoundingClientRect();
                const yesRect = yesBtn.getBoundingClientRect();

                const gap = 16;
                const yesRight = yesRect.right - containerRect.left;
                const yesLeft = yesRect.left - containerRect.left;
                const yesBottom = yesRect.bottom - containerRect.top;

                if (yesRight + gap + btnRect.width <= containerRect.width) {
                    // Cabe à direita do "Sim"
                    setNoButtonPos({
                        x: yesRight + gap,
                        y: containerRect.height / 2 - btnRect.height / 2
                    });
                } else if (yesLeft - gap - btnRect.width >= 0) {
                    // Cabe à esquerda do "Sim"
                    setNoButtonPos({
                        x: yesLeft - gap - btnRect.width,
                        y: containerRect.height / 2 - btnRect.height / 2
                    });
                } else {
                    // Não cabe ao lado: coloca embaixo
                    setNoButtonPos({
                        x: Math.max(containerRect.width / 2 - btnRect.width / 2, 0),
                        y: Math.min(yesBottom + gap, containerRect.height - btnRect.height)
                    });
                }
            }, []);

            const translations = {
                pt: {
                    welcome: "Você quer ir em um date comigo?",
                    yes: "Sim!",
                    no: "Não",
                    foodQuestion: "O que você gostaria de comer?",
                    cuisines: {
                        sushi: "🍣 Sushi",
                        pizza: "🍕 Pizza",
                        korean: "🥘 Coreana",
                        italian: "🍝 Italiana",
                        japanese: "🍲 Japonesa",
                        french: "🥖 Francesa",
                        mexican: "🌮 Mexicana",
                        thai: "🍜 Tailandesa"
                    },
                    dateQuestion: "Que dias você está disponível?",
                    selectTime: "Escolha o horário",
                    times: ["11:00", "12:00", "13:00", "14:00", "18:00", "19:00", "20:00", "21:00"],
                    success: "Perfeito! Vejo você em breve! 💕",
                    language: "Idioma"
                },
                en: {
                    welcome: "Will you go on a date with me?",
                    yes: "Yes!",
                    no: "No",
                    foodQuestion: "What would you like to eat?",
                    cuisines: {
                        sushi: "🍣 Sushi",
                        pizza: "🍕 Pizza",
                        korean: "🥘 Korean",
                        italian: "🍝 Italian",
                        japanese: "🍲 Japanese",
                        french: "🥖 French",
                        mexican: "🌮 Mexican",
                        thai: "🍜 Thai"
                    },
                    dateQuestion: "Which days work for you?",
                    selectTime: "Choose a time",
                    times: ["11:00", "12:00", "13:00", "14:00", "18:00", "19:00", "20:00", "21:00"],
                    success: "Perfect! See you soon! 💕",
                    language: "Language"
                },
                ja: {
                    welcome: "デートしませんか？",
                    yes: "はい！",
                    no: "いいえ",
                    foodQuestion: "何を食べたいですか？",
                    cuisines: {
                        sushi: "🍣 寿司",
                        pizza: "🍕 ピザ",
                        korean: "🥘 韓国料理",
                        italian: "🍝 イタリアン",
                        japanese: "🍲 和食",
                        french: "🥖 フランス料理",
                        mexican: "🌮 メキシコ料理",
                        thai: "🍜 タイ料理"
                    },
                    dateQuestion: "都合のいい日付は？",
                    selectTime: "時間を選択",
                    times: ["11:00", "12:00", "13:00", "14:00", "18:00", "19:00", "20:00", "21:00"],
                    success: "完璧です！近々会いましょう！💕",
                    language: "言語"
                }
            };

            const t = translations[language];

            const getNextMonth = () => {
                const dates = [];
                const today = new Date();
                const year = today.getFullYear();
                const month = today.getMonth();

                for (let i = 1; i <= 30; i++) {
                    const date = new Date(year, month, today.getDate() + i);
                    dates.push(date);
                }
                return dates;
            };

            const toggleDateSelection = (dateString) => {
                setSelectedDates(prev => {
                    if (prev.includes(dateString)) {
                        return prev.filter(d => d !== dateString);
                    } else {
                        return [...prev, dateString];
                    }
                });
            };

            const formatDateDisplay = (date) => {
                return date.toLocaleDateString(language === 'ja' ? 'ja-JP' : language === 'pt' ? 'pt-BR' : 'en-US', {
                    weekday: 'short',
                    day: 'numeric'
                });
            };

            const isDateSelected = (dateString) => {
                return selectedDates.includes(dateString);
            };

            const submitDate = async () => {
                setSendError(false);
                setSending(true);
                try {
                    const res = await fetch(FORMSPREE_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({
                            comida: t.cuisines[selectedFood],
                            dias: selectedDates.join(', '),
                            horario: selectedTime,
                            _subject: '💕 Alguém aceitou o date!'
                        })
                    });
                    if (!res.ok) throw new Error('failed');
                    setCurrentPage(3);
                } catch (err) {
                    setSendError(true);
                } finally {
                    setSending(false);
                }
            };

            const yesScale = 1 + dodgeCount * 0.18;

            return (
                <div style={{
                    minHeight: '100vh',
                    background: 'radial-gradient(circle at 20% 20%, #2d1b4e 0%, #16132b 45%, #0b0a17 100%)',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '20px',
                    position: 'relative',
                    overflow: 'hidden'
                }}>
                    <div style={{
                        position: 'absolute',
                        top: '-15%',
                        left: '-10%',
                        width: '500px',
                        height: '500px',
                        borderRadius: '50%',
                        background: 'radial-gradient(circle, rgba(255,94,168,0.25) 0%, transparent 70%)',
                        filter: 'blur(40px)'
                    }} />
                    <div style={{
                        position: 'absolute',
                        bottom: '-15%',
                        right: '-10%',
                        width: '500px',
                        height: '500px',
                        borderRadius: '50%',
                        background: 'radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%)',
                        filter: 'blur(40px)'
                    }} />

                    {/* Language Selector */}
                    <div style={{
                        position: 'absolute',
                        top: 'clamp(14px, 3vw, 24px)',
                        right: 'clamp(14px, 3vw, 24px)',
                        display: 'flex',
                        gap: '8px',
                        zIndex: 2
                    }}>
                        {['pt', 'en', 'ja'].map(lang => (
                            <button
                                key={lang}
                                onClick={() => setLanguage(lang)}
                                style={{
                                    padding: 'clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px)',
                                    border: language === lang ? 'none' : '1px solid rgba(255,255,255,0.15)',
                                    borderRadius: '999px',
                                    background: language === lang ? ACCENT_GRADIENT : 'rgba(255,255,255,0.05)',
                                    color: language === lang ? 'white' : TEXT_MUTED,
                                    cursor: 'pointer',
                                    fontWeight: language === lang ? '600' : '500',
                                    fontSize: '12px',
                                    transition: 'all 0.25s ease',
                                    backdropFilter: 'blur(10px)'
                                }}
                            >
                                {lang.toUpperCase()}
                            </button>
                        ))}
                    </div>

                    <div style={{
                        background: 'rgba(255,255,255,0.06)',
                        backdropFilter: 'blur(24px)',
                        border: '1px solid rgba(255,255,255,0.12)',
                        borderRadius: '28px',
                        padding: 'clamp(32px, 6vw, 56px) clamp(20px, 5vw, 44px)',
                        maxWidth: '600px',
                        width: '100%',
                        boxShadow: '0 25px 70px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.03) inset',
                        textAlign: 'center',
                        position: 'relative',
                        zIndex: 1
                    }}>
                        {currentPage === 0 && (
                            <div>
                                <h1 style={{
                                    fontSize: 'clamp(26px, 6vw, 36px)',
                                    marginBottom: 'clamp(32px, 7vw, 48px)',
                                    background: ACCENT_GRADIENT,
                                    WebkitBackgroundClip: 'text',
                                    WebkitTextFillColor: 'transparent',
                                    backgroundClip: 'text',
                                    fontWeight: '700',
                                    letterSpacing: '-0.5px',
                                    lineHeight: '1.3'
                                }}>
                                    {t.welcome}
                                </h1>

                                <div
                                    ref={buttonsRowRef}
                                    style={{
                                        position: 'relative',
                                        width: '100%',
                                        height: '200px'
                                    }}
                                >
                                    <button
                                        ref={yesButtonRef}
                                        onClick={() => setCurrentPage(1)}
                                        style={{
                                            position: 'absolute',
                                            left: '33%',
                                            top: '50%',
                                            transform: `translate(-50%, -50%) scale(${yesScale})`,
                                            transformOrigin: 'center',
                                            padding: 'clamp(13px, 3.5vw, 16px) clamp(30px, 8vw, 54px)',
                                            fontSize: 'clamp(15px, 4vw, 17px)',
                                            fontWeight: '700',
                                            border: 'none',
                                            borderRadius: '999px',
                                            background: ACCENT_GRADIENT,
                                            color: 'white',
                                            cursor: 'pointer',
                                            boxShadow: '0 10px 30px rgba(255, 94, 168, 0.35)',
                                            transition: 'transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)',
                                            zIndex: 1
                                        }}
                                    >
                                        {t.yes}
                                    </button>

                                    <button
                                        ref={noButtonRef}
                                        onMouseEnter={dodgeNoButton}
                                        onClick={dodgeNoButton}
                                        style={{
                                            position: 'absolute',
                                            left: noButtonPos ? `${noButtonPos.x}px` : '60%',
                                            top: noButtonPos ? `${noButtonPos.y}px` : '50%',
                                            padding: 'clamp(12px, 3.5vw, 15px) clamp(26px, 7vw, 46px)',
                                            fontSize: 'clamp(14px, 4vw, 16px)',
                                            fontWeight: '600',
                                            border: '1.5px solid rgba(255,255,255,0.25)',
                                            borderRadius: '999px',
                                            background: 'rgba(255,255,255,0.04)',
                                            color: TEXT_MUTED,
                                            cursor: 'pointer',
                                            transform: `rotate(${dodgeCount * 23}deg) skew(${Math.min(dodgeCount * 6, 40)}deg, ${Math.min(dodgeCount * 3, 20)}deg) scale(${Math.max(1 - dodgeCount * 0.12, 0.15)})`,
                                            transformOrigin: 'center',
                                            opacity: Math.max(1 - dodgeCount * 0.08, 0.3),
                                            transition: 'left 0.25s ease, top 0.25s ease, transform 0.3s ease, opacity 0.3s ease',
                                            zIndex: 2
                                        }}
                                    >
                                        {t.no}
                                    </button>
                                </div>
                            </div>
                        )}

                        {currentPage === 1 && (
                            <div>
                                <h2 style={{
                                    fontSize: '28px',
                                    marginBottom: '32px',
                                    color: 'white',
                                    fontWeight: '700',
                                    letterSpacing: '-0.5px'
                                }}>
                                    {t.foodQuestion}
                                </h2>

                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: 'repeat(2, 1fr)',
                                    gap: '12px',
                                    marginBottom: '32px'
                                }}>
                                    {Object.entries(t.cuisines).map(([key, value]) => (
                                        <button
                                            key={key}
                                            onClick={() => setSelectedFood(key)}
                                            style={{
                                                padding: '18px 16px',
                                                border: selectedFood === key ? `1.5px solid ${ACCENT}` : '1px solid rgba(255,255,255,0.12)',
                                                borderRadius: '16px',
                                                background: selectedFood === key ? ACCENT_SOFT : 'rgba(255,255,255,0.03)',
                                                color: selectedFood === key ? 'white' : TEXT_MUTED,
                                                cursor: 'pointer',
                                                fontSize: '15px',
                                                fontWeight: '500',
                                                transition: 'all 0.2s ease'
                                            }}
                                            onMouseEnter={(e) => {
                                                e.target.style.borderColor = ACCENT;
                                                e.target.style.color = 'white';
                                            }}
                                            onMouseLeave={(e) => {
                                                if (selectedFood !== key) {
                                                    e.target.style.borderColor = 'rgba(255,255,255,0.12)';
                                                    e.target.style.color = TEXT_MUTED;
                                                }
                                            }}
                                        >
                                            {value}
                                        </button>
                                    ))}
                                </div>

                                <button
                                    onClick={() => selectedFood && setCurrentPage(2)}
                                    disabled={!selectedFood}
                                    style={{
                                        padding: '14px 54px',
                                        fontSize: '16px',
                                        fontWeight: '700',
                                        border: 'none',
                                        borderRadius: '999px',
                                        background: selectedFood ? ACCENT_GRADIENT : 'rgba(255,255,255,0.08)',
                                        color: selectedFood ? 'white' : TEXT_MUTED,
                                        cursor: selectedFood ? 'pointer' : 'not-allowed',
                                        transition: 'all 0.3s ease',
                                        boxShadow: selectedFood ? '0 10px 30px rgba(255, 94, 168, 0.35)' : 'none'
                                    }}
                                >
                                    {t.yes}
                                </button>
                            </div>
                        )}

                        {currentPage === 2 && (
                            <div>
                                <h2 style={{
                                    fontSize: '28px',
                                    marginBottom: '28px',
                                    color: 'white',
                                    fontWeight: '700',
                                    letterSpacing: '-0.5px'
                                }}>
                                    {t.dateQuestion}
                                </h2>

                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: 'repeat(4, 1fr)',
                                    gap: '10px',
                                    marginBottom: '28px',
                                    maxHeight: '300px',
                                    overflowY: 'auto',
                                    padding: '4px'
                                }}>
                                    {getNextMonth().map((date, idx) => {
                                        const dateString = date.toISOString().split('T')[0];
                                        const isSelected = isDateSelected(dateString);
                                        return (
                                            <button
                                                key={idx}
                                                onClick={() => toggleDateSelection(dateString)}
                                                style={{
                                                    padding: '12px 8px',
                                                    border: isSelected ? `1.5px solid ${ACCENT}` : '1px solid rgba(255,255,255,0.12)',
                                                    borderRadius: '12px',
                                                    background: isSelected ? ACCENT_GRADIENT : 'rgba(255,255,255,0.03)',
                                                    color: isSelected ? 'white' : TEXT_MUTED,
                                                    cursor: 'pointer',
                                                    fontSize: '13px',
                                                    fontWeight: '500',
                                                    transition: 'all 0.2s ease',
                                                    textAlign: 'center'
                                                }}
                                                onMouseEnter={(e) => {
                                                    if (!isSelected) {
                                                        e.target.style.borderColor = ACCENT;
                                                        e.target.style.color = 'white';
                                                    }
                                                }}
                                                onMouseLeave={(e) => {
                                                    if (!isSelected) {
                                                        e.target.style.borderColor = 'rgba(255,255,255,0.12)';
                                                        e.target.style.color = TEXT_MUTED;
                                                    }
                                                }}
                                            >
                                                {formatDateDisplay(date)}
                                            </button>
                                        );
                                    })}
                                </div>

                                <div style={{ marginBottom: '28px', textAlign: 'left' }}>
                                    <label style={{
                                        display: 'block',
                                        marginBottom: '10px',
                                        color: 'white',
                                        fontSize: '14px',
                                        fontWeight: '600'
                                    }}>
                                        {t.selectTime}
                                    </label>
                                    <select
                                        value={selectedTime || ''}
                                        onChange={(e) => setSelectedTime(e.target.value)}
                                        style={{
                                            width: '100%',
                                            padding: '14px',
                                            borderRadius: '12px',
                                            border: '1px solid rgba(255,255,255,0.15)',
                                            fontSize: '15px',
                                            cursor: 'pointer',
                                            background: 'rgba(255,255,255,0.05)',
                                            color: 'white',
                                            fontWeight: '500'
                                        }}
                                    >
                                        <option value="" style={{ background: '#16132b' }}>Select...</option>
                                        {t.times.map((time) => (
                                            <option key={time} value={time} style={{ background: '#16132b', color: 'white' }}>
                                                {time}
                                            </option>
                                        ))}
                                    </select>
                                </div>

                                <button
                                    onClick={() => selectedDates.length > 0 && selectedTime && !sending && submitDate()}
                                    disabled={selectedDates.length === 0 || !selectedTime || sending}
                                    style={{
                                        padding: '14px 54px',
                                        fontSize: '16px',
                                        fontWeight: '700',
                                        border: 'none',
                                        borderRadius: '999px',
                                        background: (selectedDates.length > 0 && selectedTime) ? ACCENT_GRADIENT : 'rgba(255,255,255,0.08)',
                                        color: (selectedDates.length > 0 && selectedTime) ? 'white' : TEXT_MUTED,
                                        cursor: (selectedDates.length > 0 && selectedTime && !sending) ? 'pointer' : 'not-allowed',
                                        transition: 'all 0.3s ease',
                                        boxShadow: (selectedDates.length > 0 && selectedTime) ? '0 10px 30px rgba(255, 94, 168, 0.35)' : 'none',
                                        opacity: sending ? 0.7 : 1
                                    }}
                                >
                                    {sending ? '...' : t.yes}
                                </button>

                                {sendError && (
                                    <p style={{
                                        marginTop: '16px',
                                        color: '#ff8b8b',
                                        fontSize: '13px',
                                        fontWeight: '500'
                                    }}>
                                        Ops, não consegui enviar. Verifique o endpoint do Formspree e tente de novo.
                                    </p>
                                )}
                            </div>
                        )}

                        {currentPage === 3 && (
                            <div>
                                <h1 style={{
                                    fontSize: '32px',
                                    marginBottom: '20px',
                                    background: ACCENT_GRADIENT,
                                    WebkitBackgroundClip: 'text',
                                    WebkitTextFillColor: 'transparent',
                                    backgroundClip: 'text',
                                    fontWeight: '700',
                                    letterSpacing: '-0.5px'
                                }}>
                                    ✨ {t.success}
                                </h1>
                                <div style={{
                                    background: 'rgba(255,255,255,0.05)',
                                    padding: '24px',
                                    borderRadius: '18px',
                                    marginTop: '25px',
                                    color: 'white',
                                    border: '1px solid rgba(255,255,255,0.12)'
                                }}>
                                    <p style={{ fontSize: '16px', margin: '10px 0', fontWeight: '500' }}>
                                        🍽️ <strong>{t.cuisines[selectedFood]}</strong>
                                    </p>
                                    <p style={{ fontSize: '14px', margin: '10px 0', color: TEXT_MUTED }}>
                                        {selectedDates.length === 1 ? selectedDates[0] : `${selectedDates.length} dates`}
                                    </p>
                                    <p style={{ fontSize: '16px', margin: '10px 0', fontWeight: '500' }}>
                                        🕐 {selectedTime}
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<DateProposal />, document.getElementById('root'));
    </script>
</body>
</html>
